# Publish @decent-render/protocol to npm via OIDC TRUSTED PUBLISHING — passwordless.
#
# NO npm token exists (nothing to steal, rotate, or store). npm trusts THIS
# workflow in THIS repo + environment, authenticated each run by a short-lived
# OIDC token issued by GitHub. Combined with the package setting "Require 2FA
# and disallow tokens", ONLY this workflow can publish — token publishes are
# rejected entirely. This is the OpenSSF trusted-publishers standard (same as
# PyPI/RubyGems).
#
# ── ONE-TIME SETUP (owner) ──────────────────────────────────────────────
#  npmjs.com → @decent-render/protocol → Settings:
#   • Trusted Publisher → GitHub Actions:
#       Organization/user = decent-render
#       Repository        = decent-render
#       Workflow filename = publish-protocol.yml   (filename only)
#       Environment name  = publish
#       Allowed actions   = npm publish
#     → Set up connection.
#   • Publishing access → "Require two-factor authentication and disallow
#     tokens (recommended)" → Update.
#  GitHub → repo Settings → Environments → New "publish" → Required reviewers = you.
#
#  No NPM_TOKEN secret. No token of any kind. (Revoke the legacy npm_KUHZ… token.)
#
# Requires npm CLI ≥11.5.1 + Node ≥22.14 — Node 24 (below) bundles npm 11.
name: Publish protocol package

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: "npm pack only (no publish)"
        type: boolean
        default: false

# id-token: write is REQUIRED — lets GitHub mint the OIDC token npm verifies.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-22.04
    # Must match the trusted publisher's "Environment name". Create this
    # environment in GitHub Settings with Required reviewers = you (manual
    # approval gate before any publish).
    environment: publish
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24' # bundles npm 11 (≥11.5.1 required for trusted publishing)
          registry-url: 'https://registry.npmjs.org'
          # No cache for release builds (reproducibility).

      - name: Install
        working-directory: packages/protocol
        run: npm install

      - name: Build (tsc → dist)
        working-directory: packages/protocol
        run: npm run build

      - name: Conformance tests must pass before publish
        working-directory: packages/protocol
        run: npm test

      - name: Dry run (npm pack — no publish)
        if: ${{ inputs.dry-run }}
        working-directory: packages/protocol
        run: npm pack

      # No NODE_AUTH_TOKEN — the npm CLI auto-detects the GitHub OIDC
      # environment and authenticates via the trusted publisher.
      - name: Publish (OIDC trusted publisher — no token)
        if: ${{ !inputs.dry-run }}
        working-directory: packages/protocol
        run: npm publish --access public
