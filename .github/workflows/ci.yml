# CI — keeps the wire protocol from drifting between the TS package and the
# Rust supervisor-core. Runs the shared-fixture conformance on BOTH sides.
# (The cargo-dist release pipeline lives in release.yml; this is the PR/push
# gate that catches a protocol mismatch BEFORE release.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust + CLI quality gates
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p supervisor-core -p decent-node --all-targets --all-features -- -D warnings
      # Includes Rust cross-language fixture conformance.
      - run: cargo test -p supervisor-core -p decent-node
      - run: cargo build -p decent-node
      - run: ./target/debug/decent-node --version
      - run: ./target/debug/decent-node --help

  protocol:
    name: protocol package conformance (TS)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: packages/protocol
      - run: bun run build
        working-directory: packages/protocol
      - run: bun run test
        working-directory: packages/protocol

  app-frontend:
    name: Tauri frontend build + tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: apps/decent-app
      - run: bun run build
        working-directory: apps/decent-app
      - run: bun run test
        working-directory: apps/decent-app
