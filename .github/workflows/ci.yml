# CI — keeps the wire protocol from drifting between the TS package and the
# Rust supervisor-core. Runs the shared-fixture conformance on BOTH sides.
# (The cargo-dist release pipeline lives in release.yml; this is the PR/push
# gate that catches a protocol mismatch BEFORE release.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust + CLI quality gates
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p supervisor-core -p decent --all-targets --all-features -- -D warnings
      # Includes Rust cross-language fixture conformance.
      - run: cargo test -p supervisor-core -p decent
      - run: cargo build -p decent
      - run: ./target/debug/decent --version
      - run: ./target/debug/decent --help

  protocol:
    name: protocol package conformance (TS)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
        working-directory: packages/protocol
      - run: bun run build
        working-directory: packages/protocol
      - run: bun run test
        working-directory: packages/protocol

  app-frontend:
    name: Tauri frontend build + tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun install --frozen-lockfile
        working-directory: apps/decent-app
      - run: bun run build
        working-directory: apps/decent-app
      - run: bun run test
        working-directory: apps/decent-app
