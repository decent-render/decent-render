version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /packages/protocol
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /apps/decent-app
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
